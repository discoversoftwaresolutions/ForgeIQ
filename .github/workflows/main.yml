name: CI-CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-and-lint:
    name: Test and Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Match Render's Node version if possible, or your target
          

      - name: Install dependencies
        run: npm run bootstrap # Uses the script from root package.json

      - name: Lint
        run: npm run lint --workspaces --if-present # Runs lint script in all workspaces

      - name: Test
        run: npm run test --workspaces --if-present -- --passWithNoTests # Runs test script in all workspaces

  # Deployment jobs (triggered on push to main, after tests pass)
  # Ensure Render's build filters are the primary gate for rebuilds.
  # These jobs just notify Render to check the latest commit.

  deploy_forgeiq_ui:
    name: Deploy ForgeIQ UI
    needs: test-and-lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_FORGEIQ_UI }}

  deploy_debugiq_core:
    name: Deploy DebugIQ Core
    needs: test-and-lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_DEBUGIQ_CORE }}

  deploy_plan_agent_worker: # Example for one agent
    name: Deploy PlanAgent Worker
    needs: test-and-lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_PLAN_AGENT }}
